services:
  db:
    container_name: alugae-db
    image: mysql:8.4.9
    env_file:
      - ../../.env
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  api:
    build:
      context: ../../.
      dockerfile: infra/docker/Dockerfile
    container_name: alugae-api
    env_file:
      - ../../.env
    depends_on:
      - db
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - ../../:/Backend
      - /Backend/node_modules

    command: npm run dev:debug

volumes:
  db_data:
